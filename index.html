<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merge Tool</title>
  <meta name="description" content="Merge multiple PDF files into one, locally in your browser. No uploads, no server required." />
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface-2:   #293548;
      --border:      #334155;
      --accent:      #6366f1;
      --accent-lt:   #818cf8;
      --violet:      #8b5cf6;
      --text-1:      #f1f5f9;
      --text-2:      #94a3b8;
      --text-3:      #64748b;
      --green:       #10b981;
      --red:         #ef4444;
      --r:           12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────── */
    .hd {
      padding: 2.25rem 1.5rem 0;
      text-align: center;
    }
    .hd-inner { max-width: 680px; margin: 0 auto; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: .625rem;
      margin-bottom: .625rem;
    }
    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--text-1) 10%, var(--accent-lt) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { color: var(--text-2); font-size: .875rem; line-height: 1.6; }

    /* ── Main ───────────────────────────────────── */
    main { flex: 1; padding: 2rem 1.5rem; }
    .wrap { max-width: 680px; margin: 0 auto; }

    /* ── Drop Zone ──────────────────────────────── */
    .dz {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
      user-select: none;
    }
    .dz:hover         { border-color: var(--accent); background: rgba(99,102,241,.05); }
    .dz.over          { border-color: var(--accent); background: rgba(99,102,241,.09); transform: scale(1.006); }

    .dz-icon { width: 58px; height: 58px; margin: 0 auto 1.25rem; color: var(--accent); }

    .dz-title { font-size: 1.05rem; font-weight: 600; margin-bottom: .375rem; }
    .dz-sub   { color: var(--text-2); font-size: .85rem; margin-bottom: 1.25rem; }

    .btn-add {
      display: inline-flex; align-items: center; gap: .375rem;
      padding: .5625rem 1.25rem;
      background: var(--accent); color: #fff;
      font-size: .875rem; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-add:hover  { background: var(--accent-lt); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ── File List ──────────────────────────────── */
    .fl { margin-top: 1.5rem; display: none; }
    .fl.vis { display: block; }

    .fl-hd {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .875rem;
    }
    .fl-label {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-3);
    }
    .btn-clear {
      font-size: .8rem; color: var(--red);
      background: none; border: none; cursor: pointer;
      padding: .25rem .5rem; border-radius: 5px;
      transition: background .15s;
    }
    .btn-clear:hover { background: rgba(239,68,68,.1); }

    .fi-list { display: flex; flex-direction: column; gap: .5rem; }

    .fi {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; cursor: grab;
      transition: border-color .15s, background .15s, box-shadow .15s;
      position: relative;
    }
    .fi:hover { border-color: rgba(99,102,241,.45); background: var(--surface-2); }
    .fi.dragging { opacity: .4; cursor: grabbing; }

    .fi.ind-before::before,
    .fi.ind-after::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 2px;
      background: var(--accent); border-radius: 2px;
    }
    .fi.ind-before::before { top: -4px; }
    .fi.ind-after::after   { bottom: -4px; }

    .fi-grip { color: var(--text-3); cursor: grab; flex-shrink: 0; line-height: 0; }
    .fi-thumb {
      width: 34px; height: 34px;
      background: rgba(99,102,241,.13); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-lt); flex-shrink: 0;
    }
    .fi-info { flex: 1; min-width: 0; }
    .fi-name {
      font-size: .875rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fi-size { font-size: .75rem; color: var(--text-3); margin-top: .15rem; }
    .fi-num {
      font-size: .7rem; font-weight: 700; color: var(--text-3);
      background: rgba(255,255,255,.05);
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-rm {
      background: none; border: none; color: var(--text-3);
      cursor: pointer; padding: .25rem; border-radius: 4px;
      display: flex; align-items: center;
      transition: color .15s, background .15s; flex-shrink: 0;
    }
    .btn-rm:hover { color: var(--red); background: rgba(239,68,68,.08); }

    /* ── Action Row ─────────────────────────────── */
    .act { margin-top: 1.5rem; }
    .btn-merge {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .9375rem;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: #fff; font-size: 1rem; font-weight: 600; letter-spacing: -.01em;
      border: none; border-radius: var(--r); cursor: pointer;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(99,102,241,.35);
    }
    .btn-merge:hover:not(:disabled)  { opacity: .91; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(99,102,241,.45); }
    .btn-merge:active:not(:disabled) { transform: translateY(0); }
    .btn-merge:disabled { opacity: .38; cursor: not-allowed; box-shadow: none; }

    /* spinner */
    .spin {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rot .65s linear infinite;
      display: none;
    }
    .spin.on { display: block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Status ─────────────────────────────────── */
    .msg {
      margin-top: 1rem;
      padding: .875rem 1rem;
      border-radius: 10px; font-size: .875rem;
      display: none; align-items: center; gap: .5rem;
    }
    .msg.on { display: flex; }
    .msg.ok   { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.25); color: var(--green); }
    .msg.err  { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.25);  color: var(--red);   }
    .msg.busy { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2);  color: var(--accent-lt); }

    /* ── Footer ─────────────────────────────────── */
    footer {
      padding: 1.75rem 1.5rem;
      text-align: center; color: var(--text-3); font-size: .8rem;
    }
    footer span { color: var(--text-2); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 480px) {
      .dz { padding: 2.5rem 1.25rem; }
      .brand-name { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<header class="hd">
  <div class="hd-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <line x1="9"  y1="14" x2="15" y2="14"/>
        </svg>
      </div>
      <span class="brand-name">PDF Merge</span>
    </div>
    <p class="tagline">Combine multiple PDFs into one &mdash; fast, free, and 100% in your browser.</p>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- Drop Zone -->
    <div class="dz" id="dz" role="button" tabindex="0" aria-label="Drop PDF files here or click to browse">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
      </div>
      <div class="dz-title">Drop PDF files here</div>
      <p class="dz-sub">Drag &amp; drop one or more PDF files, or click below to browse</p>
      <button class="btn-add" id="btnAdd" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Files
      </button>
      <input type="file" id="fileInput" accept=".pdf,application/pdf" multiple hidden />
    </div>

    <!-- File List -->
    <div class="fl" id="fl">
      <div class="fl-hd">
        <span class="fl-label" id="flLabel">0 files selected</span>
        <button class="btn-clear" id="btnClear" type="button">Clear all</button>
      </div>
      <div class="fi-list" id="fiList"></div>
    </div>

    <!-- Merge Button -->
    <div class="act">
      <button class="btn-merge" id="btnMerge" type="button" disabled>
        <span class="spin" id="spin"></span>
        <svg id="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <span id="lbl">Merge PDFs</span>
      </button>
    </div>

    <!-- Status Message -->
    <div class="msg" id="msg" role="alert" aria-live="polite"></div>

  </div>
</main>

<footer>
  <span>All processing happens locally in your browser.</span> No files are uploaded anywhere.
</footer>

<script>
'use strict';
{

  let files      = [];
  let dragSrcIdx = null;

  const dz        = document.getElementById('dz');
  const btnAdd    = document.getElementById('btnAdd');
  const fileInput = document.getElementById('fileInput');
  const fl        = document.getElementById('fl');
  const flLabel   = document.getElementById('flLabel');
  const btnClear  = document.getElementById('btnClear');
  const fiList    = document.getElementById('fiList');
  const btnMerge  = document.getElementById('btnMerge');
  const spin      = document.getElementById('spin');
  const ico       = document.getElementById('ico');
  const lbl       = document.getElementById('lbl');
  const msg       = document.getElementById('msg');

  /* ── Drop Zone ────────────────────────────────── */

  dz.addEventListener('click', (e) => {
    if (e.target === btnAdd || btnAdd.contains(e.target)) return;
    fileInput.click();
  });
  dz.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });
  btnAdd.addEventListener('click', (e) => {
    e.stopPropagation();
    fileInput.click();
  });

  dz.addEventListener('dragenter', stopEv);
  dz.addEventListener('dragover',  (e) => {
    stopEv(e);
    if (dragSrcIdx === null) dz.classList.add('over');
  });
  dz.addEventListener('dragleave', (e) => {
    if (!dz.contains(e.relatedTarget)) dz.classList.remove('over');
  });
  dz.addEventListener('drop', (e) => {
    stopEv(e);
    dz.classList.remove('over');
    if (dragSrcIdx !== null) return; // reorder drag — ignore
    if (e.dataTransfer && e.dataTransfer.files.length) {
      addFiles(Array.from(e.dataTransfer.files));
    }
  });

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  /* ── Clear ────────────────────────────────────── */

  btnClear.addEventListener('click', () => {
    files = [];
    render();
    clearMsg();
  });

  /* ── Add / Filter ─────────────────────────────── */

  function addFiles(incoming) {
    const pdfs = incoming.filter(f =>
      f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
    );
    if (!pdfs.length && incoming.length) {
      setMsg('err', svgWarn(), 'Only PDF files are supported.');
      return;
    }
    pdfs.forEach(f => {
      const dup = files.some(x => x.name === f.name && x.size === f.size);
      if (!dup) files.push(f);
    });
    clearMsg();
    render();
  }

  /* ── Render ───────────────────────────────────── */

  function render() {
    const n = files.length;
    fl.classList.toggle('vis', n > 0);
    btnMerge.disabled = n < 2;
    flLabel.textContent = n + ' file' + (n !== 1 ? 's' : '') + ' selected';
    fiList.innerHTML = '';
    files.forEach((f, i) => fiList.appendChild(buildItem(f, i)));
  }

  function buildItem(file, idx) {
    const el = document.createElement('div');
    el.className = 'fi';
    el.draggable = true;
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="fi-grip" aria-hidden="true">${svgGrip()}</div>
      <div class="fi-thumb">${svgFilePdf()}</div>
      <div class="fi-info">
        <div class="fi-name">${esc(file.name)}</div>
        <div class="fi-size">${fmtBytes(file.size)}</div>
      </div>
      <div class="fi-num">${idx + 1}</div>
      <button class="btn-rm" type="button" title="Remove file" aria-label="Remove ${esc(file.name)}">${svgClose()}</button>`;

    el.querySelector('.btn-rm').addEventListener('click', (e) => {
      e.stopPropagation();
      files.splice(idx, 1);
      clearMsg();
      render();
    });

    /* drag-to-reorder */
    el.addEventListener('dragstart', (e) => {
      dragSrcIdx = idx;
      requestAnimationFrame(() => el.classList.add('dragging'));
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx)); // Firefox needs data
    });
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const r   = el.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      clearInds();
      el.classList.add(e.clientY < mid ? 'ind-before' : 'ind-after');
    });
    el.addEventListener('dragleave', (e) => {
      if (!el.contains(e.relatedTarget)) {
        el.classList.remove('ind-before', 'ind-after');
      }
    });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (dragSrcIdx === null || dragSrcIdx === idx) { clearInds(); return; }
      const r      = el.getBoundingClientRect();
      const before = e.clientY < r.top + r.height / 2;
      const src    = dragSrcIdx;
      let   dest   = idx;
      const moved  = files.splice(src, 1)[0];
      // recalculate dest after removal
      if (src < dest) dest = before ? dest - 1 : dest;
      else            dest = before ? dest     : dest + 1;
      files.splice(dest, 0, moved);
      dragSrcIdx = null;
      render();
    });
    el.addEventListener('dragend', () => {
      dragSrcIdx = null;
      clearInds();
      document.querySelectorAll('.fi').forEach(x => x.classList.remove('dragging'));
    });

    return el;
  }

  function clearInds() {
    document.querySelectorAll('.fi').forEach(x => x.classList.remove('ind-before', 'ind-after'));
  }

  /* ── Merge ────────────────────────────────────── */

  btnMerge.addEventListener('click', async () => {
    if (files.length < 2) return;
    if (typeof PDFLib === 'undefined') {
      setMsg('err', svgWarn(), 'PDF library failed to load. Check your internet connection and reload the page.');
      return;
    }

    setBusy(true);
    setMsg('busy', svgInfo(), 'Preparing to merge ' + files.length + ' files\u2026');

    try {
      const merged = await PDFLib.PDFDocument.create();

      for (const [i, file] of files.entries()) {
        setMsg('busy', svgInfo(), `Processing file ${i + 1} of ${files.length}\u2026`);
        const buf   = await file.arrayBuffer();
        const doc   = await PDFLib.PDFDocument.load(buf);
        const pages = await merged.copyPages(doc, doc.getPageIndices());
        pages.forEach(p => merged.addPage(p));
      }

      setMsg('busy', svgInfo(), 'Saving merged PDF\u2026');
      const bytes = await merged.save();
      const blob  = new Blob([bytes], { type: 'application/pdf' });
      const url   = URL.createObjectURL(blob);
      const a     = document.createElement('a');
      a.href     = url;
      a.download = 'merged.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 30000);

      const total = merged.getPageCount();
      setMsg('ok', svgCheck(),
        'Merged ' + files.length + ' files into ' + total + ' page' + (total !== 1 ? 's' : '') +
        '. Download started.');
    } catch (err) {
      console.error(err);
      let hint = '';
      if (/encrypt/i.test(err.message)) hint = ' (Encrypted PDFs are not supported.)';
      setMsg('err', svgWarn(), 'Merge failed: ' + (err.message || 'Unknown error') + hint);
    } finally {
      setBusy(false);
    }
  });

  /* ── Helpers ──────────────────────────────────── */

  function setBusy(on) {
    btnMerge.disabled = on;
    spin.classList.toggle('on', on);
    ico.style.display = on ? 'none' : '';
    lbl.textContent   = on ? 'Merging\u2026' : 'Merge PDFs';
  }

  function setMsg(type, icon, text) {
    msg.className = 'msg on ' + type;
    msg.innerHTML = icon + '<span>' + esc(text) + '</span>';
  }

  function clearMsg() {
    msg.className = 'msg';
    msg.innerHTML = '';
  }

  function fmtBytes(n) {
    if (n >= 1048576) return (n / 1048576).toFixed(1) + ' MB';
    if (n >= 1024)    return (n / 1024).toFixed(0)    + ' KB';
    return n + ' B';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function stopEv(e) { e.preventDefault(); e.stopPropagation(); }

  /* ── SVG icons (inline) ───────────────────────── */

  function svgGrip() {
    return '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">' +
      '<circle cx="5"  cy="3"  r="1.25"/><circle cx="5"  cy="8"  r="1.25"/><circle cx="5"  cy="13" r="1.25"/>' +
      '<circle cx="11" cy="3"  r="1.25"/><circle cx="11" cy="8"  r="1.25"/><circle cx="11" cy="13" r="1.25"/>' +
      '</svg>';
  }

  function svgFilePdf() {
    return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
      '<polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/>' +
      '</svg>';
  }

  function svgClose() {
    return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">' +
      '<line x1="18" y1="6"  x2="6"  y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>' +
      '</svg>';
  }

  function svgCheck() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">' +
      '<polyline points="20 6 9 17 4 12"/>' +
      '</svg>';
  }

  function svgWarn() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">' +
      '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' +
      '</svg>';
  }

  function svgInfo() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">' +
      '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>' +
      '</svg>';
  }
}
</script>
</body>
</html>
